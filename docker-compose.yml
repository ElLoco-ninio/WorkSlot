version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: workslot-postgres
    environment:
      POSTGRES_USER: workslot
      POSTGRES_PASSWORD: workslot
      POSTGRES_DB: workslot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workslot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: workslot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workslot-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://workslot:workslot@postgres:5432/workslot
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
      - ENVIRONMENT=development
      - EMAIL_CONSOLE_MODE=true
      - FRONTEND_URL=http://localhost:5173
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:8080"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: workslot-dashboard
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules

  # Widget Static Server
  widget:
    image: nginx:alpine
    container_name: workslot-widget
    ports:
      - "3000:80"
    volumes:
      - ./widget/dist:/usr/share/nginx/html:ro
      - ./widget/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:

