<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkSlot Widget Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #1f2937;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #6b7280;
        }
        
        .info-box {
            background: #f3f4f6;
            border-left: 4px solid #6366f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .info-box p {
            color: #374151;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .info-box code {
            background: #e5e7eb;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .widget-container {
            min-height: 600px;
            background: #f9fafb;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #workslot-calendar {
            width: 100%;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WorkSlot Widget Test Page</h1>
            <p>Test the embeddable booking calendar widget on this mock website</p>
        </div>
        
        <div class="content">
            <div class="card">
                <h2>Configuration</h2>
                
                <div class="info-box">
                    <p><strong>Instructions:</strong></p>
                    <p>1. Get your API key from the dashboard</p>
                    <p>2. Enter it below and click "Load Widget"</p>
                    <p>3. The calendar will appear on the right</p>
                </div>
                
                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input 
                        type="text" 
                        id="apiKey" 
                        placeholder="wsk_your_api_key_here"
                        value=""
                    />
                </div>
                
                <div class="form-group">
                    <label for="apiUrl">API URL</label>
                    <input 
                        type="text" 
                        id="apiUrl" 
                        placeholder="http://localhost:8000"
                        value="http://localhost:8000"
                    />
                </div>
                
                <div class="form-group">
                    <label for="theme">Theme</label>
                    <select id="theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="primaryColor">Primary Color</label>
                    <input 
                        type="color" 
                        id="primaryColor" 
                        value="#6366f1"
                    />
                </div>
                
                <button class="btn" onclick="loadWidget()">Load Widget</button>
                <button class="btn btn-secondary" onclick="clearWidget()" style="margin-left: 10px;">Clear</button>
                
                <div id="status"></div>
            </div>
            
            <div class="card">
                <h2>Widget Preview</h2>
                <div class="widget-container">
                    <div id="workslot-calendar"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Load WorkSlot Widget -->
    <script>
        // Set API URL globally before loading widget
        window.WORKSLOT_API_URL = document.getElementById('apiUrl').value || 'http://localhost:8000';
    </script>
    <script src="http://localhost:3000/workslot.js"></script>
    
    <script>
        let widgetInstance = null;
        
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }
        
        function loadWidget() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const theme = document.getElementById('theme').value;
            const primaryColor = document.getElementById('primaryColor').value;
            const container = document.getElementById('workslot-calendar');
            
            if (!apiKey) {
                showStatus('Please enter an API key', 'error');
                return;
            }
            
            if (!apiKey.startsWith('wsk_')) {
                showStatus('API key should start with "wsk_"', 'error');
                return;
            }
            
            // Clear previous widget
            clearWidget();
            
            // Update global API URL
            window.WORKSLOT_API_URL = apiUrl;
            
            // Show loading status
            showStatus('Loading widget...', 'info');
            
            // Initialize widget
            try {
                if (window.WorkSlot && window.WorkSlot.init) {
                    widgetInstance = window.WorkSlot.init({
                        apiKey: apiKey,
                        container: '#workslot-calendar',
                        theme: theme,
                        primaryColor: primaryColor,
                        onBookingSuccess: (booking) => {
                            showStatus(`Booking successful! ID: ${booking.id}`, 'success');
                            console.log('Booking successful:', booking);
                        },
                        onBookingError: (error) => {
                            showStatus(`Booking error: ${error.message || error}`, 'error');
                            console.error('Booking error:', error);
                        }
                    });
                    showStatus('Widget loaded successfully!', 'success');
                } else {
                    showStatus('WorkSlot widget not loaded. Make sure the script is accessible.', 'error');
                }
            } catch (error) {
                showStatus(`Error loading widget: ${error.message}`, 'error');
                console.error('Widget error:', error);
            }
        }
        
        function clearWidget() {
            const container = document.getElementById('workslot-calendar');
            container.innerHTML = '';
            widgetInstance = null;
            document.getElementById('status').style.display = 'none';
        }
        
        // Allow Enter key to load widget
        document.getElementById('apiKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadWidget();
            }
        });
    </script>
</body>
</html>
